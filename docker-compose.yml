version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "${BACKEND_PORT}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.draw-api.rule=Host(`api.draw.mixdev.me`)
      - traefik.http.routers.draw-api.entrypoints=https
      - traefik.http.routers.draw-api.tls.certresolver=letsencrypt
      - traefik.http.services.draw-api.loadbalancer.server.port=${BACKEND_PORT}

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
    expose:
      - "4173"
    labels:
      - traefik.enable=true
      - traefik.http.routers.draw-web.rule=Host(`draw.mixdev.me`)
      - traefik.http.routers.draw-web.entrypoints=https
      - traefik.http.routers.draw-web.tls.certresolver=letsencrypt
      - traefik.http.services.draw-web.loadbalancer.server.port=4173

  # Realtime collaboration via Yjs WebSocket server (y-websocket)
  # Kept as "excalidraw-room" service name per requirement.
  excalidraw-room:
    build:
      context: ./realtime
    environment:
      PORT: 1234
    expose:
      - "1234"
    labels:
      - traefik.enable=true
      - traefik.http.routers.draw-ws.rule=Host(`ws.draw.mixdev.me`)
      - traefik.http.routers.draw-ws.entrypoints=https
      - traefik.http.routers.draw-ws.tls.certresolver=letsencrypt
      - traefik.http.services.draw-ws.loadbalancer.server.port=1234

volumes:
  postgres_data:


